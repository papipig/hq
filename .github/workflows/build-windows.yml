name: Build Windows EXE

on:
  push:
    branches: ["main"]
    tags: ["v*"]         # trigger on version tags like v1.0, v1.2.3
  pull_request:
    branches: ["main"]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame>=2.6 pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller hq.spec

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeroQuest-windows
          path: dist/HeroQuest.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HeroQuest.exe
          name: "HeroQuest ${{ github.ref_name }}"
          body: "Windows standalone build — no installation needed, just run HeroQuest.exe"
